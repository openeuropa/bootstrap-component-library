packages:
  - "bootstrap"
  - "builder"
  - "src/data/*"
  - "src/components/*"
  - "src/compositions/*"
  - "tools/**"
  - "src/themes/*"
  - "src/themes/**/storybook"

linkWorkspacePackages: true
nodeLinker: hoisted
packageImportMethod: clone-or-copy
publicHoistPattern:
  - "@openeuropa/*"

overrides:
  '@babel/core@<=7.29.0': 7.29.7
  '@rollup/plugin-terser>serialize-javascript': 7.0.5
  '@sigstore/core@<=3.2.0': 3.2.1
  '@xmldom/xmldom': 0.8.13
  '@istanbuljs/load-nyc-config>js-yaml': 3.15.0
  '@tootallnate/once': 3.0.1
  axios: 1.18.0
  basic-ftp: 5.3.1
  bn.js@5.2.2: 5.2.3
  'brace-expansion@<1.1.16': 1.1.16
  'brace-expansion@>=2.0.0 <2.1.2': 2.1.2
  'brace-expansion@>=3.0.0 <5.0.7': 5.0.7
  crypto-js: 4.2.0
  copyfiles>minimatch: 3.1.4
  defu: 6.1.7
  'esbuild@>=0.27.3 <0.28.1': 0.28.1
  fast-uri: 3.1.4
  flatted: 3.4.2
  form-data: 4.0.6
  glob@10.4.5: 10.5.0
  glob@11.0.3: 11.1.0
  glob@7.2.3>minimatch: 3.1.4
  handlebars: 4.7.9
  immutable: 4.3.9
  js-yaml@3.14.1: 3.15.0
  js-yaml@>=4.0.0 <4.3.0: 4.3.0
  locutus: 3.0.36
  lodash: 4.18.1
  merge: 2.1.1
  minimatch@10.1.1: 10.2.3
  minimatch@10.2.3>brace-expansion: 5.0.7
  minimatch@10.2.4>brace-expansion: 5.0.7
  minimatch@3.0.5: 3.1.4
  minimatch@3.1.4>brace-expansion: 1.1.16
  nx>yaml: 2.8.3
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  postcss@<=8.5.11: 8.5.12
  ajv@8.17.1: 8.18.0
  schema-utils@4.3.3>ajv: 8.18.0
  shell-quote: 1.10.0
  sigstore: 4.1.1
  socket.io-parser: 4.2.6
  svgo@^2.8.0: 2.8.3
  svgo@^4.0.0: 4.0.2
  tar: 7.5.19
  tar-fs: 3.1.1
  terser-webpack-plugin: 5.4.0
  tmp: 0.2.7
  undici: 6.27.0
  ws: 8.21.0
  yaml@2.8.1: 2.8.3

packageExtensions:
  "@storybook/addon-docs@*":
    dependencies:
      "@types/react": "^19.0.0"
  "@storybook/addon-webpack5-compiler-babel@*":
    dependencies:
      webpack: "^5.0.0"
  "storybook@*":
    dependencies:
      "@testing-library/dom": "^10.4.0"

allowBuilds:
  '@parcel/watcher': true
  core-js: true
  esbuild: true
  nx: true
  unrs-resolver: true

patchedDependencies:
  locutus@3.0.36: patches/locutus@3.0.36.patch
  twing@7.3.1: patches/twing@7.3.1.patch
