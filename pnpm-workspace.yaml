packages:
  - "bootstrap"
  - "builder"
  - "src/data/*"
  - "src/components/*"
  - "src/compositions/*"
  - "tools/**"
  - "src/themes/*"
  - "src/themes/**/storybook"

linkWorkspacePackages: true
nodeLinker: hoisted
packageImportMethod: clone-or-copy
publicHoistPattern:
  - "@openeuropa/*"

overrides:
  '@rollup/plugin-terser>serialize-javascript': 7.0.5
  '@xmldom/xmldom': 0.8.12
  '@istanbuljs/load-nyc-config>js-yaml': 3.14.2
  basic-ftp: 5.2.1
  bn.js@5.2.2: 5.2.3
  crypto-js: 4.2.0
  copyfiles>minimatch: 3.1.4
  defu: 6.1.7
  flatted: 3.4.2
  glob@10.4.5: 10.5.0
  glob@11.0.3: 11.1.0
  glob@7.2.3>minimatch: 3.1.4
  handlebars: 4.7.9
  immutable: 3.8.3
  js-yaml@3.14.1: 3.14.2
  lodash: 4.18.1
  merge: 2.1.1
  minimatch@10.1.1: 10.2.3
  minimatch@10.2.3>brace-expansion: 5.0.5
  minimatch@10.2.4>brace-expansion: 5.0.5
  minimatch@3.0.5: 3.1.4
  minimatch@3.1.4>brace-expansion: 1.1.13
  nx>yaml: 2.8.3
  picomatch@<2.3.2: 2.3.2
  picomatch@>=4.0.0 <4.0.4: 4.0.4
  ajv@8.17.1: 8.18.0
  schema-utils@4.3.3>ajv: 8.18.0
  socket.io-parser: 4.2.6
  svgo@^2.8.0: 2.8.1
  svgo@^4.0.0: 4.0.1
  tar-fs: 3.1.1
  terser-webpack-plugin: 5.4.0
  ws: 8.17.1
  yaml@2.8.1: 2.8.3

packageExtensions:
  "@storybook/addon-docs@*":
    dependencies:
      "@types/react": "^19.0.0"
  "@storybook/addon-webpack5-compiler-babel@*":
    dependencies:
      webpack: "^5.0.0"
  "storybook@*":
    dependencies:
      "@testing-library/dom": "^10.4.0"
